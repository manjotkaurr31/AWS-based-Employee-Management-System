name: CI/CD to ECS

on:
push:
branches:
- main

env:
AWS_REGION: ap-south-1
ECR_REPOSITORY: employee-api
ECS_CLUSTER: employee-management-cluster
ECS_SERVICE: employee-management-cluster-task-def-service-56wq9c85
TASK_DEFINITION: employee-management-cluster-task-def
CONTAINER_NAME: employee-container   # <-- IMPORTANT (we'll verify below)

jobs:
deploy:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v3

  - name: Configure AWS credentials
    uses: aws-actions/configure-aws-credentials@v2
    with:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      aws-region: ${{ env.AWS_REGION }}

  - name: Login to ECR
    uses: aws-actions/amazon-ecr-login@v1

  - name: Build, tag, and push image
    id: build-image
    run: |
      IMAGE_TAG=${{ github.sha }}
      docker build -t $ECR_REPOSITORY:$IMAGE_TAG .
      docker tag $ECR_REPOSITORY:$IMAGE_TAG 370613533360.dkr.ecr.ap-south-1.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG
      docker push 370613533360.dkr.ecr.ap-south-1.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG
      echo "image=370613533360.dkr.ecr.ap-south-1.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  - name: Download task definition
    run: |
      aws ecs describe-task-definition \
        --task-definition $TASK_DEFINITION \
        --query taskDefinition > task-def.json

  - name: Fill in new image
    uses: aws-actions/amazon-ecs-render-task-definition@v1
    with:
      task-definition: task-def.json
      container-name: ${{ env.CONTAINER_NAME }}
      image: ${{ steps.build-image.outputs.image }}

  - name: Deploy to ECS
    uses: aws-actions/amazon-ecs-deploy-task-definition@v1
    with:
      task-definition: task-def.json
      service: ${{ env.ECS_SERVICE }}
      cluster: ${{ env.ECS_CLUSTER }}
      wait-for-service-stability: true
```
