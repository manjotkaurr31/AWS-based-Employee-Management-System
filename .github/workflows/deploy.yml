name: Build and Push to ECR

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build Docker image
        run: docker build -t employee-api .

      - name: Tag image
        run: docker tag employee-api:latest 370613533360.dkr.ecr.ap-south-1.amazonaws.com/employee-api:latest

      - name: Push to ECR
        run: docker push 370613533360.dkr.ecr.ap-south-1.amazonaws.com/employee-api:latest
